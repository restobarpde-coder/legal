name: Sync inbox email

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Sync Hostinger inboxes
        env:
          APP_URL: https://app.centrodeasesoramiento.com
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail-with-body --silent --show-error --max-time 55 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/api/email/sync/cron"
